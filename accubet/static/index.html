<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AccuBet Dashboard</title>
<style>
  :root {
    --sans: system-ui, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, Consolas, monospace;
  }

  /* ── Dark theme (default) ── */
  html {
    --text: #c9cdd6;
    --text-h: #f3f4f6;
    --bg: #16171d;
    --border: #2e303a;
    --surface: #1f2028;
    --accent: #c084fc;
    --accent-bg: rgba(192, 132, 252, 0.15);
    --accent-border: rgba(192, 132, 252, 0.5);
    --shadow: rgba(0,0,0,0.4) 0 10px 15px -3px, rgba(0,0,0,0.25) 0 4px 6px -2px;
    --green: #4ade80;
    --green-bg: rgba(74, 222, 128, 0.12);
    --green-border: rgba(74, 222, 128, 0.3);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.12);
    --red-border: rgba(248, 113, 113, 0.3);
    --yellow: #facc15;
    --yellow-bg: rgba(250, 204, 21, 0.12);
    --yellow-border: rgba(250, 204, 21, 0.3);
    --blue: #60a5fa;
    --dim: #94a3b8;
  }

  /* ── Light theme ── */
  [data-theme="light"] {
    --text: #3d3848;
    --text-h: #08060d;
    --bg: #fff;
    --border: #e5e4e7;
    --surface: #f4f3ec;
    --accent: #aa3bff;
    --accent-bg: rgba(170, 59, 255, 0.1);
    --accent-border: rgba(170, 59, 255, 0.5);
    --shadow: rgba(0,0,0,0.1) 0 10px 15px -3px, rgba(0,0,0,0.05) 0 4px 6px -2px;
    --green: #16a34a;
    --green-bg: rgba(22, 163, 74, 0.1);
    --green-border: rgba(22, 163, 74, 0.3);
    --red: #dc2626;
    --red-bg: rgba(220, 38, 38, 0.1);
    --red-border: rgba(220, 38, 38, 0.3);
    --yellow: #a16207;
    --yellow-bg: rgba(161, 98, 7, 0.1);
    --yellow-border: rgba(161, 98, 7, 0.3);
    --blue: #2563eb;
    --dim: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    height: 56px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-h);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.2px;
    text-decoration: none;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .header-subtitle { color: var(--dim); font-size: 12px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .status-chip {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--dim);
    padding: 4px 10px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
  }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
  }
  #status-dot.offline { background: var(--red); }
  .icon-btn {
    background: none; border: 1px solid var(--border);
    color: var(--dim); width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: all .15s;
  }
  .icon-btn:hover {
    border-color: var(--accent-border);
    color: var(--accent); background: var(--accent-bg);
  }

  /* ── NAV ── */
  nav {
    display: flex; gap: 4px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
  }
  nav button {
    background: none; border: 1px solid transparent;
    color: var(--dim); padding: 5px 16px;
    border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 500;
    font-family: var(--sans);
    transition: all .15s;
  }
  nav button:hover { background: var(--accent-bg); color: var(--text-h); }
  nav button.active {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    color: var(--accent);
  }

  /* ── MAIN LAYOUT ── */
  main { padding: 20px 24px; }

  /* ── KPI GRID ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; margin-bottom: 20px;
  }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    transition: border-color .15s;
  }
  .kpi:hover { border-color: var(--accent-border); }
  .kpi .label {
    color: var(--dim); font-size: 10px;
    text-transform: uppercase; letter-spacing: .6px;
    font-weight: 500; margin-bottom: 8px;
  }
  .kpi .value {
    font-size: 22px; font-weight: 700;
    color: var(--text-h); font-variant-numeric: tabular-nums;
  }
  .kpi .value.pos { color: var(--green); }
  .kpi .value.neg { color: var(--red); }
  .kpi .value.acc { color: var(--accent); }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 14px;
  }
  .section-title {
    font-size: 11px; font-weight: 600;
    color: var(--dim); text-transform: uppercase; letter-spacing: .6px;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap; margin-bottom: 14px;
  }
  .controls label {
    color: var(--dim); font-size: 12px;
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; padding: 5px 10px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); transition: all .15s;
  }
  .controls label:hover { border-color: var(--accent-border); color: var(--text-h); }
  .controls input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--accent); }
  .controls select {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 5px 10px; border-radius: 8px;
    font-size: 12px; font-family: var(--sans); cursor: pointer;
    outline: none; transition: border-color .15s;
  }
  .controls select:focus { border-color: var(--accent-border); }
  .refresh-btn {
    margin-left: auto; background: none;
    border: 1px solid var(--accent-border); color: var(--accent);
    padding: 5px 14px; border-radius: 8px; cursor: pointer;
    font-size: 12px; font-weight: 500; font-family: var(--sans);
    transition: all .15s;
  }
  .refresh-btn:hover { background: var(--accent-bg); }

  /* ── GENERIC CARD ── */
  .card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }

  /* ── OPPORTUNITY CARDS ── */
  .opp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
  }
  .opp-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    transition: border-color .15s, box-shadow .15s;
  }
  .opp-card:hover { border-color: var(--accent-border); box-shadow: var(--shadow); }
  .opp-stripe { height: 3px; }
  .opp-stripe.ev-high { background: #22c55e; }
  .opp-stripe.ev-mid  { background: #f59e0b; }
  .opp-stripe.ev-low  { background: #60a5fa; }
  .opp-body { padding: 12px 14px 14px; }
  .opp-head {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px; margin-bottom: 7px;
  }
  .opp-match {
    font-size: 13px; font-weight: 600;
    color: var(--text-h); line-height: 1.3;
  }
  .opp-time { font-size: 11px; color: var(--dim); white-space: nowrap; flex-shrink: 0; }
  .opp-market-row {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap; margin-bottom: 10px;
  }
  .opp-market { font-size: 12px; color: var(--dim); }
  .opp-selection { font-size: 12px; font-weight: 600; color: var(--text-h); }
  .opp-metrics {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 11px;
  }
  .metric-item { display: flex; flex-direction: column; gap: 2px; }
  .metric-label {
    font-size: 9px; color: var(--dim);
    text-transform: uppercase; letter-spacing: .5px;
  }
  .metric-value {
    font-size: 14px; font-weight: 700;
    font-variant-numeric: tabular-nums; color: var(--text-h);
  }
  .metric-value.ev-pos { color: var(--green); }
  .metric-value.ev-neg { color: var(--red); }
  .opp-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .odds-pill {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--accent-bg); border: 1px solid var(--accent-border);
    color: var(--accent); font-size: 14px; font-weight: 700;
    padding: 3px 10px; border-radius: 7px; font-variant-numeric: tabular-nums;
  }

  /* ── BADGES ── */
  .badge {
    display: inline-flex; align-items: center;
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 5px;
    letter-spacing: .3px; text-transform: uppercase;
  }
  .badge-pass   { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border); }
  .badge-steam  { background: rgba(96,165,250,0.12); color: var(--blue); border: 1px solid rgba(96,165,250,0.3); }
  .badge-win    { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border); }
  .badge-loss   { background: var(--red-bg);    color: var(--red);    border: 1px solid var(--red-border); }
  .badge-pend   { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .badge-void   { background: rgba(148,163,184,0.1); color: var(--dim); border: 1px solid var(--border); }

  /* ── CONFIDENCE PILLS ── */
  .conf-pill {
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 5px; color: #fff;
    text-transform: uppercase; letter-spacing: .3px;
  }
  .conf-high { background: #22c55e; }
  .conf-mid  { background: #eab308; }
  .conf-low  { background: #64748b; }

  /* ── SOURCE TAGS ── */
  .src-tag {
    display: inline-flex; align-items: center;
    font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 5px; letter-spacing: .3px;
  }
  .src-bw   { background: rgba(37,99,235,0.15);  color: #60a5fa; border: 1px solid rgba(37,99,235,0.3); }
  .src-bp   { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
  .src-best { background: rgba(148,163,184,0.1); color: var(--dim); border: 1px solid var(--border); }

  /* ── TABLES ── */
  table { width: 100%; border-collapse: collapse; }
  th {
    background: var(--surface); color: var(--dim);
    font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
    font-weight: 600; padding: 10px 14px; text-align: left;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  td {
    padding: 9px 14px; border-bottom: 1px solid var(--border);
    font-size: 13px; vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .1s; }
  tbody tr:hover td { background: var(--surface); }

  /* ── DATE GROUP HEADER ── */
  .group-row td { padding: 0; border: none; }
  .group-header {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    background: var(--accent-bg);
    border-top: 1px solid var(--accent-border);
    border-bottom: 1px solid var(--accent-border);
  }
  .group-date { font-size: 12px; font-weight: 600; color: var(--accent); }
  .group-meta { font-size: 11px; color: var(--dim); display: flex; gap: 12px; }

  /* ── PERFORMANCE TABLE ── */
  .perf-table td:first-child { font-weight: 500; color: var(--text-h); }
  .win-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .win-bar { width: 44px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
  .win-bar-fill { height: 100%; border-radius: 2px; }

  /* ── MISC ── */
  .empty { text-align: center; color: var(--dim); padding: 48px; font-size: 13px; }
  .pnl-pos { color: var(--green); font-weight: 600; font-variant-numeric: tabular-nums; }
  .pnl-neg { color: var(--red);   font-weight: 600; font-variant-numeric: tabular-nums; }
  .tab { display: none; }
  .tab.active { display: block; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  code {
    font-family: var(--mono); font-size: 12px;
    padding: 2px 6px; background: var(--surface);
    border-radius: 4px; border: 1px solid var(--border);
    color: var(--text-h);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚽</div>
    AccuBet
  </div>
  <span class="header-subtitle">Football value-betting engine</span>
  <div class="header-right">
    <div class="status-chip">
      <span id="status-dot"></span>
      <span id="status-text">connecting…</span>
    </div>
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle light/dark">☀</button>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('scan', this)">Value Scan</button>
  <button onclick="switchTab('bets', this)">Bets</button>
  <button onclick="switchTab('perf', this)">Performance</button>
</nav>

<main>

<!-- SCAN TAB -->
<div id="tab-scan" class="tab active">
  <div class="kpi-row" id="scan-kpis"></div>
  <div class="section-header">
    <span class="section-title">Upcoming opportunities</span>
    <div style="display:flex;gap:8px;align-items:center">
      <label style="color:var(--dim);font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface)">
        <input type="checkbox" id="gates-only" onchange="loadScan()" style="width:14px;height:14px;accent-color:var(--accent)"> Gates only
      </label>
      <button class="refresh-btn" onclick="loadScan()">↻ Refresh</button>
    </div>
  </div>
  <div class="opp-grid" id="scan-grid">
    <div style="grid-column:1/-1;padding:48px;text-align:center;color:var(--dim)"><span class="spinner"></span>Loading…</div>
  </div>
</div>

<!-- BETS TAB -->
<div id="tab-bets" class="tab">
  <div class="controls">
    <label><input type="checkbox" id="settled-only" onchange="loadBets()"> Settled only</label>
    <select id="market-filter" onchange="loadBets()">
      <option value="">All markets</option>
      <option value="match_winner">Match winner</option>
      <option value="over_under">Over/Under</option>
      <option value="btts">BTTS</option>
    </select>
    <button class="refresh-btn" onclick="loadBets()">↻ Refresh</button>
  </div>
  <div class="section-title" style="margin-bottom:12px">Paper bet history</div>
  <div class="card" id="bets-container">
    <div class="empty">Select the Bets tab to load.</div>
  </div>
</div>

<!-- PERF TAB -->
<div id="tab-perf" class="tab">
  <div class="kpi-row" id="perf-kpis"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px">
    <div>
      <div class="section-title" style="margin-bottom:10px">By market</div>
      <div class="card" id="perf-market"></div>
    </div>
    <div>
      <div class="section-title" style="margin-bottom:10px">By kind</div>
      <div class="card" id="perf-kind"></div>
    </div>
  </div>
</div>

</main>

<script>
const BASE = '';

function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('theme-btn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.setAttribute('data-theme', 'light');
    btn.textContent = '☾';
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀';
  }
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'scan') loadScan();
  if (name === 'bets') loadBets();
  if (name === 'perf') loadPerf();
}

function pct(v, decimals=1) {
  if (v == null) return '—';
  return (v * 100).toFixed(decimals) + '%';
}
function pnlClass(v) { return v > 0 ? 'pnl-pos' : v < 0 ? 'pnl-neg' : ''; }
function evClass(v) { return v > 0 ? 'pnl-pos' : v < 0 ? 'pnl-neg' : ''; }

function evStripe(ev) {
  if (ev >= 0.10) return 'ev-high';
  if (ev >= 0.05) return 'ev-mid';
  return 'ev-low';
}

function confPill(v) {
  if (v == null) return '';
  const p = v * 100;
  const cls = p >= 65 ? 'conf-high' : p >= 50 ? 'conf-mid' : 'conf-low';
  return `<span class="conf-pill ${cls}">${p.toFixed(0)}%</span>`;
}

function srcTag(src) {
  if (src === 'betway')  return '<span class="src-tag src-bw">BW</span>';
  if (src === 'betpawa') return '<span class="src-tag src-bp">BP</span>';
  return '<span class="src-tag src-best">BEST</span>';
}

function fmtDatetime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short'}) + ' ' +
         d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

function fmtDateFull(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-GB', {weekday:'long', day:'2-digit', month:'short', year:'numeric'});
}

function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

function dateKey(iso) {
  return iso ? iso.slice(0, 10) : 'unknown';
}

function kpi(label, value, cls='') {
  return `<div class="kpi"><div class="label">${label}</div><div class="value ${cls}">${value}</div></div>`;
}

function perfTable(rows) {
  if (!rows || !rows.length) return '<div class="empty">No data</div>';
  return `<table class="perf-table">
    <thead><tr>
      <th>Label</th><th>Settled</th><th>Win%</th><th>Staked</th><th>P&amp;L</th><th>ROI</th>
    </tr></thead><tbody>` +
    rows.map(r => {
      const wr = r.win_rate || 0;
      const barColor = wr >= 0.6 ? '#4ade80' : wr >= 0.45 ? '#f59e0b' : '#f87171';
      return `<tr>
        <td>${r.label}</td>
        <td style="color:var(--dim)">${r.settled}</td>
        <td>
          <div class="win-bar-wrap">
            <div class="win-bar"><div class="win-bar-fill" style="width:${(wr*100).toFixed(0)}%;background:${barColor}"></div></div>
            <span style="font-variant-numeric:tabular-nums">${pct(r.win_rate)}</span>
          </div>
        </td>
        <td style="color:var(--dim);font-variant-numeric:tabular-nums">${r.staked.toFixed(0)}</td>
        <td class="${pnlClass(r.pnl)}">${r.pnl >= 0 ? '+' : ''}${r.pnl.toFixed(2)}</td>
        <td class="${pnlClass(r.roi)}">${pct(r.roi)}</td>
      </tr>`;
    }).join('') + '</tbody></table>';
}

async function checkHealth() {
  try {
    const r = await fetch(BASE + '/api/health');
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    if (r.ok) { dot.className = ''; txt.textContent = 'online'; }
    else { dot.className = 'offline'; txt.textContent = 'API error'; }
  } catch {
    document.getElementById('status-dot').className = 'offline';
    document.getElementById('status-text').textContent = 'offline';
  }
}

async function loadScan() {
  const gatesOnly = document.getElementById('gates-only').checked;
  const grid = document.getElementById('scan-grid');
  grid.innerHTML = '<div style="grid-column:1/-1;padding:48px;text-align:center;color:var(--dim)"><span class="spinner"></span>Loading opportunities…</div>';
  try {
    const r = await fetch(`${BASE}/api/scan?top=100&gates_only=${gatesOnly}`);
    const data = await r.json();
    const meta = data.meta || {};
    document.getElementById('scan-kpis').innerHTML =
      kpi('Opportunities', meta.total ?? '—') +
      kpi('Passing gates', meta.passing ?? '—', meta.passing > 0 ? 'acc' : '');

    const opps = data.opportunities || [];
    if (!opps.length) {
      grid.innerHTML = '<div style="grid-column:1/-1" class="empty">No opportunities. Run <code>accubet ingest</code> first.</div>';
      return;
    }
    grid.innerHTML = opps.map(o => {
      const line = o.line != null ? ` ${o.line}` : '';
      const implied = o.price > 0 ? pct(1 / o.price) : '—';
      const pass  = o.passes     ? '<span class="badge badge-pass">✓ Gate</span>' : '';
      const steam = o.steam_move ? '<span class="badge badge-steam">⚡ Steam</span>' : '';
      return `<div class="opp-card">
        <div class="opp-stripe ${evStripe(o.ev || 0)}"></div>
        <div class="opp-body">
          <div class="opp-head">
            <span class="opp-match">${o.match}</span>
            <span class="opp-time">${fmtDatetime(o.kickoff)}</span>
          </div>
          <div class="opp-market-row">
            <span class="opp-market">${o.market}</span>
            <span style="color:var(--border)">·</span>
            <span class="opp-selection">${o.selection}${line}</span>
            ${confPill(o.confidence)}
          </div>
          <div class="opp-metrics">
            <div class="metric-item">
              <span class="metric-label">EV</span>
              <span class="metric-value ${o.ev > 0 ? 'ev-pos' : 'ev-neg'}">${(o.ev * 100).toFixed(1)}%</span>
            </div>
            <div class="metric-item">
              <span class="metric-label">Model prob</span>
              <span class="metric-value">${pct(o.fair_prob)}</span>
            </div>
            <div class="metric-item">
              <span class="metric-label">Implied</span>
              <span class="metric-value" style="color:var(--dim)">${implied}</span>
            </div>
          </div>
          <div class="opp-footer">
            <div class="odds-pill">${o.price.toFixed(2)}</div>
            ${srcTag(o.price_source)}
            <span style="color:var(--dim);font-size:11px">${o.n_books} book${o.n_books !== 1 ? 's' : ''}</span>
            ${pass}${steam}
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    grid.innerHTML = `<div style="grid-column:1/-1" class="empty">Error: ${e.message}</div>`;
  }
}

async function loadBets() {
  const settledOnly = document.getElementById('settled-only').checked;
  const market = document.getElementById('market-filter').value;
  let url = `${BASE}/api/bets?limit=200&settled_only=${settledOnly}`;
  if (market) url += `&market=${market}`;
  const container = document.getElementById('bets-container');
  container.innerHTML = '<div class="empty"><span class="spinner"></span>Loading…</div>';
  try {
    const r = await fetch(url);
    const data = await r.json();
    const bets = data.bets || [];
    if (!bets.length) {
      container.innerHTML = '<div class="empty">No bets. Run <code>accubet track</code>.</div>';
      return;
    }

    // Group by date (newest first)
    const groups = {};
    bets.forEach((b, i) => {
      const k = dateKey(b.placed_at);
      if (!groups[k]) groups[k] = [];
      groups[k].push({ ...b, _idx: i + 1 });
    });

    let html = `<table>
      <thead><tr>
        <th>#</th><th>Time</th><th>Market</th><th>Selection</th>
        <th>Odds</th><th>EV%</th><th>Stake</th><th>Result</th><th>P&amp;L</th><th>CLV%</th>
      </tr></thead><tbody>`;

    Object.entries(groups)
      .sort((a, b) => b[0].localeCompare(a[0]))
      .forEach(([, dayBets]) => {
        const dayPnl = dayBets.reduce((s, b) => s + (b.pnl || 0), 0);
        const pnlStr = dayPnl >= 0 ? `+${dayPnl.toFixed(2)}` : dayPnl.toFixed(2);
        const pnlColor = dayPnl > 0 ? 'var(--green)' : dayPnl < 0 ? 'var(--red)' : 'var(--dim)';

        html += `<tr class="group-row"><td colspan="10">
          <div class="group-header">
            <span class="group-date">${fmtDateFull(dayBets[0].placed_at)}</span>
            <div class="group-meta">
              <span>${dayBets.length} bet${dayBets.length !== 1 ? 's' : ''}</span>
              <span style="color:${pnlColor};font-weight:600">${pnlStr}</span>
            </div>
          </div>
        </td></tr>`;

        dayBets.forEach(b => {
          const resTag = b.result === 'win'  ? '<span class="badge badge-win">Won</span>'
                       : b.result === 'loss' ? '<span class="badge badge-loss">Lost</span>'
                       : b.result === 'void' ? '<span class="badge badge-void">Void</span>'
                       : '<span class="badge badge-pend">Pending</span>';
          const clv = b.clv != null
            ? `<span class="${pnlClass(b.clv)}">${(b.clv * 100).toFixed(1)}%</span>`
            : '—';
          html += `<tr>
            <td style="color:var(--dim);font-size:11px">${b._idx}</td>
            <td style="color:var(--dim);font-size:12px;white-space:nowrap">${fmtTime(b.placed_at)}</td>
            <td style="color:var(--dim)">${b.market}</td>
            <td style="font-weight:500;color:var(--text-h)">${b.selection}${b.line != null ? ' ' + b.line : ''}</td>
            <td style="font-weight:600;font-variant-numeric:tabular-nums">${b.odds.toFixed(2)}</td>
            <td class="${evClass(b.ev)}">${b.ev != null ? (b.ev * 100).toFixed(1) + '%' : '—'}</td>
            <td style="font-variant-numeric:tabular-nums;color:var(--dim)">${b.stake.toFixed(0)}</td>
            <td>${resTag}</td>
            <td class="${pnlClass(b.pnl)}">${b.pnl != null ? (b.pnl >= 0 ? '+' : '') + b.pnl.toFixed(2) : '—'}</td>
            <td>${clv}</td>
          </tr>`;
        });
      });

    html += '</tbody></table>';
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

async function loadPerf() {
  document.getElementById('perf-kpis').innerHTML = '<span class="spinner"></span>';
  try {
    const r = await fetch(BASE + '/api/performance');
    const data = await r.json();
    const o = data.overall;
    const roiCls = o.roi > 0 ? 'pos' : o.roi < 0 ? 'neg' : '';
    document.getElementById('perf-kpis').innerHTML =
      kpi('Settled bets', o.settled) +
      kpi('Win rate', pct(o.win_rate), o.win_rate > 0.5 ? 'pos' : '') +
      kpi('ROI', pct(o.roi), roiCls) +
      kpi('P&L', (o.pnl >= 0 ? '+' : '') + o.pnl.toFixed(2), roiCls) +
      kpi('Pending', o.pending) +
      kpi('Staked', o.staked.toFixed(0));
    document.getElementById('perf-market').innerHTML = perfTable(data.by_market || []);
    document.getElementById('perf-kind').innerHTML   = perfTable(data.by_kind   || []);
  } catch(e) {
    document.getElementById('perf-kpis').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}
