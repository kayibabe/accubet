<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AccuBet Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --text: #e2e8f0; --dim: #94a3b8; --green: #22c55e;
    --red: #ef4444; --yellow: #eab308; --blue: #3b82f6;
    --purple: #a78bfa; --cyan: #06b6d4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 700; color: var(--cyan); letter-spacing: .5px; }
  header .subtitle { color: var(--dim); font-size: 12px; }
  .badge { background: var(--green); color: #000; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 12px; }
  .badge.offline { background: var(--red); }
  nav { display: flex; gap: 4px; padding: 12px 24px; border-bottom: 1px solid var(--border); }
  nav button { background: none; border: 1px solid var(--border); color: var(--dim); padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all .15s; }
  nav button.active, nav button:hover { background: var(--surface); border-color: var(--cyan); color: var(--cyan); }
  main { padding: 20px 24px; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .kpi .label { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .kpi .value { font-size: 24px; font-weight: 700; }
  .kpi .value.pos { color: var(--green); }
  .kpi .value.neg { color: var(--red); }
  .kpi .value.neu { color: var(--text); }
  .section-title { font-size: 13px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #13161f; color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .4px; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid #1e2130; font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1e2234; }
  .tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: .3px; }
  .tag-bw { background: #1d4ed8; color: #fff; }
  .tag-bp { background: #7c3aed; color: #fff; }
  .tag-best { background: #374151; color: var(--dim); }
  .tag-win { background: #14532d; color: var(--green); }
  .tag-loss { background: #450a0a; color: var(--red); }
  .tag-pending { background: #1c1917; color: var(--yellow); }
  .tag-steam { background: #0e4f6e; color: var(--cyan); font-size: 9px; }
  .pass-star { color: var(--green); font-weight: 700; }
  .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .controls label { color: var(--dim); font-size: 12px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .controls input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--cyan); }
  .controls select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 6px; font-size: 12px; }
  .refresh-btn { margin-left: auto; background: none; border: 1px solid var(--cyan); color: var(--cyan); padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .refresh-btn:hover { background: var(--cyan); color: #000; }
  .empty { text-align: center; color: var(--dim); padding: 40px; }
  .pnl-pos { color: var(--green); font-weight: 600; }
  .pnl-neg { color: var(--red); font-weight: 600; }
  .tab { display: none; }
  .tab.active { display: block; }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; }
  #status-dot.offline { background: var(--red); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }
</style>
</head>
<body>

<header>
  <h1>&#9917; AccuBet</h1>
  <div class="subtitle">Football value-betting engine</div>
  <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">
    <span id="status-dot"></span><span id="status-text" style="font-size:12px;color:var(--dim)">connecting…</span>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('scan', this)">Value Scan</button>
  <button onclick="switchTab('bets', this)">Bets</button>
  <button onclick="switchTab('perf', this)">Performance</button>
</nav>

<main>

<!-- SCAN TAB -->
<div id="tab-scan" class="tab active">
  <div class="kpi-row" id="scan-kpis"></div>
  <div class="controls">
    <label><input type="checkbox" id="gates-only" onchange="loadScan()"> Gates only</label>
    <button class="refresh-btn" onclick="loadScan()">&#8635; Refresh</button>
  </div>
  <div class="section-title">Upcoming opportunities</div>
  <div class="card">
    <table>
      <thead><tr>
        <th>#</th><th>Match</th><th>Kickoff</th><th>Market</th><th>Pick</th>
        <th>Fair%</th><th>Price</th><th>Src</th><th>EV%</th><th>Conf</th><th>Books</th><th>Flags</th>
      </tr></thead>
      <tbody id="scan-body"><tr><td colspan="12" class="empty"><span class="spinner"></span>Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<!-- BETS TAB -->
<div id="tab-bets" class="tab">
  <div class="controls">
    <label><input type="checkbox" id="settled-only" onchange="loadBets()"> Settled only</label>
    <select id="market-filter" onchange="loadBets()">
      <option value="">All markets</option>
      <option value="match_winner">Match winner</option>
      <option value="over_under">Over/Under</option>
      <option value="btts">BTTS</option>
    </select>
    <button class="refresh-btn" onclick="loadBets()">&#8635; Refresh</button>
  </div>
  <div class="section-title">Paper bet history</div>
  <div class="card">
    <table>
      <thead><tr>
        <th>#</th><th>Placed</th><th>Market</th><th>Selection</th>
        <th>Odds</th><th>EV%</th><th>Stake</th><th>Result</th><th>P&L</th><th>CLV%</th>
      </tr></thead>
      <tbody id="bets-body"><tr><td colspan="10" class="empty">Select "Bets" tab to load.</td></tr></tbody>
    </table>
  </div>
</div>

<!-- PERF TAB -->
<div id="tab-perf" class="tab">
  <div class="kpi-row" id="perf-kpis"></div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:4px;">
    <div>
      <div class="section-title">By market</div>
      <div class="card" id="perf-market"></div>
    </div>
    <div>
      <div class="section-title">By kind</div>
      <div class="card" id="perf-kind"></div>
    </div>
  </div>
</div>

</main>

<script>
const BASE = '';

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'scan') loadScan();
  if (name === 'bets') loadBets();
  if (name === 'perf') loadPerf();
}

function pct(v, decimals=1) {
  if (v == null) return '-';
  return (v * 100).toFixed(decimals) + '%';
}
function pnlClass(v) { return v > 0 ? 'pnl-pos' : v < 0 ? 'pnl-neg' : ''; }
function evClass(v) { return v > 0 ? 'pnl-pos' : v < 0 ? 'pnl-neg' : ''; }
function srcTag(src) {
  if (src === 'betway') return '<span class="tag tag-bw">BW</span>';
  if (src === 'betpawa') return '<span class="tag tag-bp">BP</span>';
  return '<span class="tag tag-best">best</span>';
}
function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short'}) + ' ' +
         d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}
function kpi(label, value, cls='neu') {
  return `<div class="kpi"><div class="label">${label}</div><div class="value ${cls}">${value}</div></div>`;
}
function perfTable(rows) {
  if (!rows.length) return '<div class="empty">No data</div>';
  return `<table><thead><tr><th>Label</th><th>Settled</th><th>Win%</th><th>Staked</th><th>P&L</th><th>ROI</th></tr></thead><tbody>` +
    rows.map(r => `<tr>
      <td>${r.label}</td>
      <td>${r.settled}</td>
      <td>${pct(r.win_rate)}</td>
      <td>${r.staked.toFixed(0)}</td>
      <td class="${pnlClass(r.pnl)}">${r.pnl >= 0 ? '+' : ''}${r.pnl.toFixed(2)}</td>
      <td class="${pnlClass(r.roi)}">${pct(r.roi)}</td>
    </tr>`).join('') + '</tbody></table>';
}

async function checkHealth() {
  try {
    const r = await fetch(BASE + '/api/health');
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    if (r.ok) {
      dot.className = '';
      txt.textContent = 'online';
    } else {
      dot.className = 'offline';
      txt.textContent = 'API error';
    }
  } catch {
    document.getElementById('status-dot').className = 'offline';
    document.getElementById('status-text').textContent = 'offline';
  }
}

async function loadScan() {
  const gatesOnly = document.getElementById('gates-only').checked;
  const url = `${BASE}/api/scan?top=100&gates_only=${gatesOnly}`;
  const body = document.getElementById('scan-body');
  body.innerHTML = '<tr><td colspan="12" class="empty"><span class="spinner"></span>Loading…</td></tr>';
  try {
    const r = await fetch(url);
    const data = await r.json();
    const meta = data.meta || {};
    document.getElementById('scan-kpis').innerHTML =
      kpi('Opportunities', meta.total ?? '-', 'neu') +
      kpi('Passing gates', meta.passing ?? '-', meta.passing > 0 ? 'pos' : 'neu');

    const opps = data.opportunities || [];
    if (!opps.length) {
      body.innerHTML = '<tr><td colspan="12" class="empty">No opportunities. Run <code>accubet ingest</code> first.</td></tr>';
      return;
    }
    body.innerHTML = opps.map((o, i) => {
      const pass = o.passes ? '<span class="pass-star">&#9733;</span>' : '';
      const steam = o.steam_move ? '<span class="tag tag-steam">STM</span>' : '';
      const line = o.line != null ? ` ${o.line}` : '';
      return `<tr>
        <td>${i+1}${pass}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.match}</td>
        <td style="color:var(--dim);white-space:nowrap">${fmtDate(o.kickoff)}</td>
        <td>${o.market}</td>
        <td>${o.selection}${line}</td>
        <td>${pct(o.fair_prob)}</td>
        <td style="font-weight:600">${o.price.toFixed(2)}</td>
        <td>${srcTag(o.price_source)}</td>
        <td class="${evClass(o.ev)}">${(o.ev*100).toFixed(1)}%</td>
        <td style="color:var(--dim)">${(o.confidence*100).toFixed(0)}%</td>
        <td style="color:var(--dim)">${o.n_books}</td>
        <td>${steam}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    body.innerHTML = `<tr><td colspan="12" class="empty">Error: ${e.message}</td></tr>`;
  }
}

async function loadBets() {
  const settledOnly = document.getElementById('settled-only').checked;
  const market = document.getElementById('market-filter').value;
  let url = `${BASE}/api/bets?limit=200&settled_only=${settledOnly}`;
  if (market) url += `&market=${market}`;
  const body = document.getElementById('bets-body');
  body.innerHTML = '<tr><td colspan="10" class="empty"><span class="spinner"></span>Loading…</td></tr>';
  try {
    const r = await fetch(url);
    const data = await r.json();
    const bets = data.bets || [];
    if (!bets.length) {
      body.innerHTML = '<tr><td colspan="10" class="empty">No bets. Run <code>accubet track</code>.</td></tr>';
      return;
    }
    body.innerHTML = bets.map((b, i) => {
      const resTag = b.result === 'win' ? '<span class="tag tag-win">WIN</span>'
                   : b.result === 'loss' ? '<span class="tag tag-loss">LOSS</span>'
                   : '<span class="tag tag-pending">PEND</span>';
      const clv = b.clv != null ? `<span class="${pnlClass(b.clv)}">${(b.clv*100).toFixed(1)}%</span>` : '-';
      return `<tr>
        <td style="color:var(--dim)">${i+1}</td>
        <td style="color:var(--dim);white-space:nowrap">${fmtDate(b.placed_at)}</td>
        <td>${b.market}</td>
        <td>${b.selection}${b.line != null ? ' '+b.line : ''}</td>
        <td>${b.odds.toFixed(2)}</td>
        <td class="${evClass(b.ev)}">${b.ev != null ? (b.ev*100).toFixed(1)+'%' : '-'}</td>
        <td>${b.stake.toFixed(0)}</td>
        <td>${resTag}</td>
        <td class="${pnlClass(b.pnl)}">${b.pnl != null ? (b.pnl >= 0 ? '+' : '')+b.pnl.toFixed(2) : '-'}</td>
        <td>${clv}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    body.innerHTML = `<tr><td colspan="10" class="empty">Error: ${e.message}</td></tr>`;
  }
}

async function loadPerf() {
  document.getElementById('perf-kpis').innerHTML = '<span class="spinner"></span>';
  try {
    const r = await fetch(BASE + '/api/performance');
    const data = await r.json();
    const o = data.overall;
    const roiColor = o.roi > 0 ? 'pos' : o.roi < 0 ? 'neg' : 'neu';
    document.getElementById('perf-kpis').innerHTML =
      kpi('Settled bets', o.settled, 'neu') +
      kpi('Win rate', pct(o.win_rate), o.win_rate > 0.5 ? 'pos' : 'neu') +
      kpi('ROI', pct(o.roi), roiColor) +
      kpi('P&L', (o.pnl >= 0 ? '+' : '') + o.pnl.toFixed(2), roiColor) +
      kpi('Pending', o.pending, 'neu') +
      kpi('Staked', o.staked.toFixed(0), 'neu');
    document.getElementById('perf-market').innerHTML = perfTable(data.by_market || []);
    document.getElementById('perf-kind').innerHTML = perfTable(data.by_kind || []);
  } catch(e) {
    document.getElementById('perf-kpis').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

// Boot
checkHealth();
loadScan();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
