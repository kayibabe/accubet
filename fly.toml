app = "accubet"
primary_region = "jnb"   # Johannesburg — closest to Malawi

[build]
  dockerfile = "Dockerfile"

[env]
  ACCUBET_DATABASE_URL = "sqlite:////data/accubet.db"

[mounts]
  source = "accubet_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
